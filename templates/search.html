<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .search-box {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: white;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="search-box">
    <h2>Search Registrations</h2>

    <form action="/admin/search/event" method="POST">
        <input name="dept" placeholder="Department">
        <input name="event" placeholder="Event">
        <button type="submit">Search</button>
    </form>

    <br>
    <a href="/admin">← Back to Admin</a>
</div>

</body>
</html>
